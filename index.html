<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lebensplaner</title>
<style>
  :root {
    --bg: #f4f6fb;
    --card: #ffffff;
    --primary: #4f6df5;
    --primary-dark: #3a55d9;
    --text: #1f2430;
    --muted: #8a93a6;
    --danger: #e5536b;
    --warn: #e6a23c;
    --ok: #22a06b;
    --shadow: 0 10px 30px rgba(31, 36, 48, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px 80px;
  }
  .app {
    width: 100%;
    max-width: 640px;
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
    display: none;
  }

  .lock-overlay {
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 100;
  }
  .lock-card {
    background: #fff;
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 32px 28px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .lock-card h2 { margin-bottom: 6px; }
  .lock-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 18px; }
  .lock-card input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #e6e9f2;
    border-radius: 10px;
    font-size: 1.3rem;
    text-align: center;
    letter-spacing: 0.3em;
    outline: none;
    margin-bottom: 12px;
  }
  .lock-card input:focus { border-color: var(--primary); }
  .lock-card button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
  }
  .lock-card button:hover { background: var(--primary-dark); }
  .lock-fehler { color: var(--danger); font-size: 0.85rem; margin-top: 8px; min-height: 1.2em; }
  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff;
    padding: 28px 28px 22px;
  }
  header h1 { font-size: 1.5rem; display: flex; align-items: center; gap: 10px; }
  header p { margin-top: 6px; opacity: 0.85; font-size: 0.9rem; }
  .sync-status { margin-top: 8px; font-size: 0.78rem; opacity: 0.85; }

  .tabs { display: flex; gap: 8px; padding: 16px 24px 0; }
  .tab {
    flex: 1;
    background: #eef1f9;
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab.aktiv { background: var(--primary); color: #fff; }

  .filter-chips {
    display: flex;
    gap: 8px;
    padding: 14px 24px 4px;
    overflow-x: auto;
  }
  .chip {
    flex-shrink: 0;
    border: 2px solid #e6e9f2;
    background: #fff;
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 0.82rem;
    color: var(--text);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip.aktiv { border-color: var(--kat-farbe, var(--primary)); background: var(--kat-farbe, var(--primary)); color: #fff; }

  .ansicht { padding: 8px 24px 24px; }

  .abschnitt-titel {
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 18px 0 8px;
  }

  .termin-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 12px;
    border-radius: 12px;
    transition: background 0.15s;
  }
  .termin-item:hover { background: #f7f8fc; }
  .termin-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--kat-farbe, var(--primary));
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .termin-info { flex: 1; min-width: 0; }
  .termin-kopf { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .termin-titel { font-weight: 600; word-break: break-word; }
  .termin-meta { font-size: 0.82rem; color: var(--muted); margin-top: 3px; }
  .termin-notiz { font-size: 0.82rem; color: var(--muted); margin-top: 4px; font-style: italic; }
  .status {
    flex-shrink: 0;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .status.normal { background: #eef1f9; color: var(--muted); }
  .status.bald { background: #fdf1de; color: var(--warn); }
  .status.ueberfaellig { background: #fbe6ea; color: var(--danger); }

  .termin-aktionen { display: flex; gap: 6px; margin-top: 8px; }
  .termin-aktionen button {
    background: #eef1f9;
    border: none;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 0.8rem;
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s;
  }
  .termin-aktionen button:hover { background: #e2e6f4; }
  .termin-aktionen button.danger:hover { background: var(--danger); color: #fff; }

  .leer { text-align: center; color: var(--muted); padding: 30px 20px; font-size: 0.95rem; }

  .fab {
    position: absolute;
    bottom: 24px;
    right: 24px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: var(--primary);
    color: #fff;
    border: none;
    font-size: 1.8rem;
    cursor: pointer;
    box-shadow: 0 6px 18px rgba(79, 109, 245, 0.45);
    transition: background 0.15s;
  }
  .fab:hover { background: var(--primary-dark); }

  /* Kalender */
  .kalender-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 4px 12px;
    font-weight: 600;
  }
  .kalender-header button {
    background: #eef1f9;
    border: none;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    font-size: 1.1rem;
    cursor: pointer;
    color: var(--text);
  }
  .kalender-wochentage, .kalender-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .kalender-wochentage div {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    padding-bottom: 6px;
  }
  .kalender-tag {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 2px solid transparent;
    background: #f7f8fc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .kalender-tag.leer { background: transparent; cursor: default; }
  .kalender-tag.heute { border-color: var(--primary); font-weight: 700; }
  .kalender-tag.ausgewaehlt { background: var(--primary); color: #fff; }
  .kalender-punkte { display: flex; gap: 2px; }
  .kalender-punkte span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--punkt-farbe, var(--primary));
  }
  #tagDetails { margin-top: 16px; }
  #tagDetails h3 { font-size: 0.95rem; margin-bottom: 4px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(31, 36, 48, 0.45);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
    z-index: 10;
  }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h2 { margin-bottom: 16px; font-size: 1.2rem; }
  .feld { margin-bottom: 14px; }
  .feld label { display: block; font-size: 0.82rem; color: var(--muted); margin-bottom: 5px; }
  .feld input, .feld select, .feld textarea {
    width: 100%;
    padding: 10px 12px;
    border: 2px solid #e6e9f2;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
  }
  .feld input:focus, .feld select:focus, .feld textarea:focus { border-color: var(--primary); }
  .feld-zeile { display: flex; gap: 10px; }
  .feld-zeile .feld { flex: 1; }
  .radio-zeile { display: flex; gap: 16px; }
  .radio-zeile label { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; color: var(--text); }
  .radio-zeile input { width: auto; }
  .neue-kat-felder { display: flex; gap: 8px; margin-top: 8px; }
  .neue-kat-felder input[type="text"] { flex: 1; }
  .neue-kat-felder input[type="color"] { width: 46px; padding: 2px; flex-shrink: 0; }
  .neue-kat-felder input[id="f-kat-icon"] { width: 56px; flex-shrink: 0; text-align: center; }

  .modal-buttons { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  .modal-buttons button {
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .modal-buttons button[type="submit"] { background: var(--primary); color: #fff; }
  .modal-buttons button[type="submit"]:hover { background: var(--primary-dark); }
  .modal-buttons button#abbrechenBtn { background: #eef1f9; color: var(--text); }
  .modal-buttons button#kalenderBtn { background: #eef1f9; color: var(--text); }
  .modal-buttons button.danger { background: #fbe6ea; color: var(--danger); margin-right: auto; }
  .modal-buttons button.danger:hover { background: var(--danger); color: #fff; }
</style>
</head>
<body>
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-card">
    <h2>🔒 Lebensplaner</h2>
    <p>Bitte PIN eingeben</p>
    <form id="lockForm">
      <input type="password" id="lockEingabe" inputmode="numeric" maxlength="10" autocomplete="off">
      <button type="submit">Entsperren</button>
      <div class="lock-fehler" id="lockFehler"></div>
    </form>
  </div>
</div>

<div class="app">
  <header>
    <h1>🗓️ Lebensplaner</h1>
    <p>Alle Termine & Wartungen im Blick – von der Rollerinspektion bis zum Friseurtermin</p>
    <div class="sync-status" id="syncStatus">☁️ Verbinde...</div>
  </header>

  <div class="tabs">
    <button class="tab aktiv" data-tab="liste">📋 Liste</button>
    <button class="tab" data-tab="kalender">📅 Kalender</button>
  </div>

  <div class="filter-chips" id="filterChips"></div>

  <div id="ansicht-liste" class="ansicht">
    <div id="liste-km"></div>
    <div id="liste-datum"></div>
  </div>

  <div id="ansicht-kalender" class="ansicht" style="display:none">
    <div class="kalender-header">
      <button id="kalPrev">‹</button>
      <span id="kalTitel"></span>
      <button id="kalNext">›</button>
    </div>
    <div class="kalender-wochentage">
      <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
    </div>
    <div class="kalender-grid" id="kalenderGrid"></div>
    <div id="tagDetails"></div>
  </div>

  <button class="fab" id="neuBtn" title="Neuer Termin">+</button>
</div>

<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal">
    <h2 id="modalTitel">Neuer Termin</h2>
    <form id="terminForm">
      <div class="feld">
        <label for="f-titel">Titel</label>
        <input type="text" id="f-titel" maxlength="80" required placeholder="z.B. Friseurtermin">
      </div>

      <div class="feld">
        <label for="f-kategorie">Kategorie</label>
        <select id="f-kategorie"></select>
        <div class="neue-kat-felder" id="neueKatFelder" style="display:none">
          <input type="text" id="f-kat-icon" maxlength="2" value="🔖" title="Icon">
          <input type="text" id="f-kat-name" placeholder="Name der Kategorie" maxlength="30">
          <input type="color" id="f-kat-farbe" value="#4f6df5" title="Farbe">
        </div>
      </div>

      <div class="feld">
        <label>Terminart</label>
        <div class="radio-zeile">
          <label><input type="radio" name="f-art" value="datum" checked> Datum</label>
          <label><input type="radio" name="f-art" value="km"> Kilometerstand</label>
        </div>
      </div>

      <div id="datumFelder">
        <div class="feld-zeile">
          <div class="feld">
            <label for="f-datum">Datum</label>
            <input type="date" id="f-datum">
          </div>
          <div class="feld">
            <label for="f-uhrzeit">Uhrzeit (optional)</label>
            <input type="time" id="f-uhrzeit">
          </div>
        </div>
        <div class="feld-zeile">
          <div class="feld">
            <label for="f-wiederholung-typ">Wiederholung</label>
            <select id="f-wiederholung-typ">
              <option value="keine">Keine (einmalig)</option>
              <option value="tage">Tage</option>
              <option value="wochen">Wochen</option>
              <option value="monate">Monate</option>
              <option value="jahre">Jahre</option>
            </select>
          </div>
          <div class="feld" id="intervallFeld">
            <label for="f-wiederholung-intervall">Alle ... Einheiten</label>
            <input type="number" id="f-wiederholung-intervall" min="1" value="1">
          </div>
        </div>
      </div>

      <div id="kmFelder" style="display:none">
        <div class="feld-zeile">
          <div class="feld">
            <label for="f-aktueller-km">Aktueller Kilometerstand</label>
            <input type="number" id="f-aktueller-km" min="0" placeholder="z.B. 12000">
          </div>
          <div class="feld">
            <label for="f-km-intervall">Intervall (km)</label>
            <input type="number" id="f-km-intervall" min="1" placeholder="z.B. 5000">
          </div>
        </div>
      </div>

      <div class="feld">
        <label for="f-notiz">Notiz (optional)</label>
        <textarea id="f-notiz" rows="2" maxlength="300"></textarea>
      </div>

      <div class="modal-buttons">
        <button type="button" id="kalenderBtn" style="display:none">📅 Kalender</button>
        <button type="button" class="danger" id="loeschenBtn" style="display:none">Löschen</button>
        <button type="button" id="abbrechenBtn">Abbrechen</button>
        <button type="submit">Speichern</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGdxtrJAq7zFWtJttVP4ZJ8i3-BYhrbrA",
  authDomain: "lebensplaner-2a9eb.firebaseapp.com",
  projectId: "lebensplaner-2a9eb",
  storageBucket: "lebensplaner-2a9eb.firebasestorage.app",
  messagingSenderId: "453039824030",
  appId: "1:453039824030:web:66c64c1e49953cd5966f8f"
};

const firebaseApp = initializeApp(firebaseConfig);
const db = getFirestore(firebaseApp);
const datenRef = doc(db, "lebensplaner", "daten");

const STANDARD_KATEGORIEN = [
  { name: "Mobilität", icon: "🚗", farbe: "#4f6df5" },
  { name: "Haushalt", icon: "🏠", farbe: "#22a06b" },
  { name: "Körperpflege", icon: "💇", farbe: "#e0729a" },
  { name: "Gesundheit", icon: "➕", farbe: "#e5536b" },
  { name: "Finanzen", icon: "💶", farbe: "#c08a2e" },
  { name: "Sonstiges", icon: "📌", farbe: "#8a93a6" },
];

let kategorien = JSON.parse(localStorage.getItem("lebensplaner_kategorien") || "null") || STANDARD_KATEGORIEN.slice();
let termine = JSON.parse(localStorage.getItem("lebensplaner_termine") || "[]");
let aktiverTab = "liste";
let aktiverFilter = "alle";
let bearbeiteId = null;
const heuteStart = new Date();
let kalenderDatum = new Date(heuteStart.getFullYear(), heuteStart.getMonth(), 1);
let ausgewaehlterTag = null;

const WOCHENTAGE = ["Mo","Di","Mi","Do","Fr","Sa","So"];
const MONATE = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];

function setSyncStatus(status) {
  const el = document.getElementById("syncStatus");
  if (status === "laedt") el.textContent = "☁️ Lade...";
  else if (status === "speichert") el.textContent = "☁️ Speichere...";
  else if (status === "ok") el.textContent = "☁️ Synchronisiert";
  else if (status === "fehler") el.textContent = "⚠️ Offline – nur lokal gespeichert";
}

function speichern() {
  localStorage.setItem("lebensplaner_termine", JSON.stringify(termine));
  localStorage.setItem("lebensplaner_kategorien", JSON.stringify(kategorien));

  setSyncStatus("speichert");
  setDoc(datenRef, { termine, kategorien })
    .then(() => setSyncStatus("ok"))
    .catch(err => {
      console.error("Cloud-Speichern fehlgeschlagen:", err);
      setSyncStatus("fehler");
    });
}

function esc(str) {
  const d = document.createElement("div");
  d.textContent = str ?? "";
  return d.innerHTML;
}

function findeKategorie(name) {
  return kategorien.find(k => k.name === name) || STANDARD_KATEGORIEN[STANDARD_KATEGORIEN.length - 1];
}

function toISODate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function heuteISO() {
  return toISODate(new Date());
}

function formatDatumDE(iso) {
  const [j,m,t] = iso.split("-");
  return `${t}.${m}.${j}`;
}

function naechstesDatum(iso, typ, intervall) {
  const d = new Date(iso + "T00:00:00");
  switch (typ) {
    case "tage": d.setDate(d.getDate() + intervall); break;
    case "wochen": d.setDate(d.getDate() + intervall * 7); break;
    case "monate": d.setMonth(d.getMonth() + intervall); break;
    case "jahre": d.setFullYear(d.getFullYear() + intervall); break;
  }
  return toISODate(d);
}

function datumStatus(iso) {
  const heute = new Date(); heute.setHours(0,0,0,0);
  const d = new Date(iso + "T00:00:00");
  const diffTage = Math.round((d - heute) / 86400000);
  if (diffTage < 0) return { text: `Überfällig (${formatDatumDE(iso)})`, css: "ueberfaellig" };
  if (diffTage === 0) return { text: "Heute", css: "bald" };
  if (diffTage === 1) return { text: "Morgen", css: "bald" };
  if (diffTage <= 7) return { text: `in ${diffTage} Tagen`, css: "bald" };
  return { text: formatDatumDE(iso), css: "normal" };
}

function kmStatus(t) {
  const rest = t.naechsterKm - t.aktuellerKm;
  if (rest <= 0) return { text: "Überfällig", css: "ueberfaellig" };
  if (rest <= 500) return { text: `noch ${rest} km`, css: "bald" };
  return { text: `noch ${rest} km`, css: "normal" };
}

// --- Kalender-Export (.ics) für native iOS-Erinnerungen ---
function pad2(n) { return String(n).padStart(2, "0"); }

function icsZeitstempelUTC(d) {
  return d.getUTCFullYear() + pad2(d.getUTCMonth()+1) + pad2(d.getUTCDate())
    + "T" + pad2(d.getUTCHours()) + pad2(d.getUTCMinutes()) + pad2(d.getUTCSeconds()) + "Z";
}

function icsEscape(s) {
  return String(s ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/;/g, "\\;")
    .replace(/,/g, "\\,")
    .replace(/\r?\n/g, "\\n");
}

function terminAlsICS(t) {
  const kat = findeKategorie(t.kategorie);
  const uid = `lebensplaner-${t.id}@github`;
  const dtstamp = icsZeitstempelUTC(new Date());
  const summary = icsEscape(`${kat.icon} ${t.titel}`);
  const beschreibung = icsEscape([kat.name, t.notiz].filter(Boolean).join(" · "));
  const [jj, mm, tt] = t.datum.split("-");

  let zeitZeilen, alarmTrigger;
  if (t.uhrzeit) {
    const [hh, min] = t.uhrzeit.split(":");
    const startDate = new Date(Number(jj), Number(mm)-1, Number(tt), Number(hh), Number(min));
    const endDate = new Date(startDate.getTime() + 60*60*1000);
    const start = `${jj}${mm}${tt}T${hh}${min}00`;
    const ende = `${endDate.getFullYear()}${pad2(endDate.getMonth()+1)}${pad2(endDate.getDate())}T${pad2(endDate.getHours())}${pad2(endDate.getMinutes())}00`;
    zeitZeilen = `DTSTART:${start}\r\nDTEND:${ende}`;
    alarmTrigger = "TRIGGER:-PT0M";          // Erinnerung genau zur Terminzeit
  } else {
    const naechster = new Date(Number(jj), Number(mm)-1, Number(tt)+1);
    const start = `${jj}${mm}${tt}`;
    const ende = `${naechster.getFullYear()}${pad2(naechster.getMonth()+1)}${pad2(naechster.getDate())}`;
    zeitZeilen = `DTSTART;VALUE=DATE:${start}\r\nDTEND;VALUE=DATE:${ende}`;
    alarmTrigger = "TRIGGER:PT9H";           // Ganztägig: Erinnerung um 09:00 Uhr
  }

  return [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Lebensplaner//DE",
    "CALSCALE:GREGORIAN",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTAMP:${dtstamp}`,
    zeitZeilen,
    `SUMMARY:${summary}`,
    beschreibung ? `DESCRIPTION:${beschreibung}` : null,
    "BEGIN:VALARM",
    "ACTION:DISPLAY",
    `DESCRIPTION:${summary}`,
    alarmTrigger,
    "END:VALARM",
    "END:VEVENT",
    "END:VCALENDAR"
  ].filter(Boolean).join("\r\n");
}

function kalenderExport(id) {
  const t = termine.find(x => x.id === id);
  if (!t || t.art !== "datum") return;
  const ics = terminAlsICS(t);
  const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${(t.titel || "termin").replace(/[^\wäöüÄÖÜß-]+/g, "_")}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

// --- Filter-Chips ---
function renderFilterChips() {
  const container = document.getElementById("filterChips");
  container.innerHTML = "";

  const alleChip = document.createElement("button");
  alleChip.className = "chip" + (aktiverFilter === "alle" ? " aktiv" : "");
  alleChip.textContent = "Alle";
  alleChip.style.setProperty("--kat-farbe", "var(--primary)");
  alleChip.onclick = () => { aktiverFilter = "alle"; renderAlles(); };
  container.appendChild(alleChip);

  kategorien.forEach(k => {
    const chip = document.createElement("button");
    chip.className = "chip" + (aktiverFilter === k.name ? " aktiv" : "");
    chip.textContent = `${k.icon} ${k.name}`;
    chip.style.setProperty("--kat-farbe", k.farbe);
    chip.onclick = () => { aktiverFilter = k.name; renderAlles(); };
    container.appendChild(chip);
  });
}

// --- Listenansicht ---
function termineFuerFilter(art) {
  return termine
    .filter(t => t.art === art)
    .filter(t => aktiverFilter === "alle" || t.kategorie === aktiverFilter);
}

function terminItemHtml(t, status) {
  const kat = findeKategorie(t.kategorie);
  let meta = kat.name;
  if (t.art === "datum") {
    meta += " · " + formatDatumDE(t.datum) + (t.uhrzeit ? `, ${t.uhrzeit} Uhr` : "");
    if (t.wiederholungTyp !== "keine") {
      meta += ` · alle ${t.wiederholungIntervall} ${t.wiederholungTyp}`;
    }
  } else {
    meta += ` · aktuell ${t.aktuellerKm} km · fällig bei ${t.naechsterKm} km`;
  }

  const aktionen = [];
  if (t.art === "datum") {
    aktionen.push(`<button data-action="erledigt" data-id="${t.id}">✓ Erledigt</button>`);
    aktionen.push(`<button data-action="kalender" data-id="${t.id}">📅 Kalender</button>`);
  } else {
    aktionen.push(`<button data-action="km" data-id="${t.id}">📏 km aktualisieren</button>`);
  }
  aktionen.push(`<button data-action="edit" data-id="${t.id}">✏️ Bearbeiten</button>`);
  aktionen.push(`<button class="danger" data-action="delete" data-id="${t.id}">🗑 Löschen</button>`);

  return `
    <div class="termin-item">
      <div class="termin-icon" style="--kat-farbe:${kat.farbe}">${kat.icon}</div>
      <div class="termin-info">
        <div class="termin-kopf">
          <div class="termin-titel">${esc(t.titel)}</div>
          <div class="status ${status.css}">${esc(status.text)}</div>
        </div>
        <div class="termin-meta">${esc(meta)}</div>
        ${t.notiz ? `<div class="termin-notiz">${esc(t.notiz)}</div>` : ""}
        <div class="termin-aktionen">${aktionen.join("")}</div>
      </div>
    </div>`;
}

function renderListe() {
  const kmListe = termineFuerFilter("km").sort((a,b) => (a.naechsterKm - a.aktuellerKm) - (b.naechsterKm - b.aktuellerKm));
  const datumListe = termineFuerFilter("datum").sort((a,b) => (a.datum + (a.uhrzeit||"")).localeCompare(b.datum + (b.uhrzeit||"")));

  const kmContainer = document.getElementById("liste-km");
  const datumContainer = document.getElementById("liste-datum");

  kmContainer.innerHTML = "";
  if (kmListe.length) {
    kmContainer.innerHTML = `<div class="abschnitt-titel">📏 Kilometerbasiert</div>` +
      kmListe.map(t => terminItemHtml(t, kmStatus(t))).join("");
  }

  datumContainer.innerHTML = "";
  if (datumListe.length) {
    datumContainer.innerHTML = `<div class="abschnitt-titel">📅 Termine</div>` +
      datumListe.map(t => terminItemHtml(t, datumStatus(t.datum))).join("");
  }

  if (!kmListe.length && !datumListe.length) {
    datumContainer.innerHTML = `<div class="leer">Noch keine Termine – leg los! 🚀</div>`;
  }
}

// --- Kalenderansicht ---
function renderKalender() {
  const jahr = kalenderDatum.getFullYear();
  const monat = kalenderDatum.getMonth();
  document.getElementById("kalTitel").textContent = `${MONATE[monat]} ${jahr}`;

  const erster = new Date(jahr, monat, 1);
  const startOffset = (erster.getDay() + 6) % 7; // Montag = 0
  const tageImMonat = new Date(jahr, monat + 1, 0).getDate();

  const datumTermine = {};
  termine.filter(t => t.art === "datum" && (aktiverFilter === "alle" || t.kategorie === aktiverFilter)).forEach(t => {
    (datumTermine[t.datum] = datumTermine[t.datum] || []).push(t);
  });

  const grid = document.getElementById("kalenderGrid");
  grid.innerHTML = "";
  const heute = heuteISO();

  for (let i = 0; i < startOffset; i++) {
    const leer = document.createElement("div");
    leer.className = "kalender-tag leer";
    grid.appendChild(leer);
  }

  for (let tag = 1; tag <= tageImMonat; tag++) {
    const iso = `${jahr}-${String(monat+1).padStart(2,"0")}-${String(tag).padStart(2,"0")}`;
    const zelle = document.createElement("div");
    zelle.className = "kalender-tag";
    if (iso === heute) zelle.classList.add("heute");
    if (iso === ausgewaehlterTag) zelle.classList.add("ausgewaehlt");

    const nummer = document.createElement("div");
    nummer.textContent = tag;
    zelle.appendChild(nummer);

    const eintraege = datumTermine[iso] || [];
    if (eintraege.length) {
      const punkte = document.createElement("div");
      punkte.className = "kalender-punkte";
      const farben = [...new Set(eintraege.map(t => findeKategorie(t.kategorie).farbe))].slice(0,4);
      farben.forEach(f => {
        const p = document.createElement("span");
        p.style.setProperty("--punkt-farbe", f);
        punkte.appendChild(p);
      });
      zelle.appendChild(punkte);
    }

    zelle.onclick = () => {
      ausgewaehlterTag = (ausgewaehlterTag === iso) ? null : iso;
      renderKalender();
    };

    grid.appendChild(zelle);
  }

  const details = document.getElementById("tagDetails");
  if (ausgewaehlterTag) {
    const eintraege = (datumTermine[ausgewaehlterTag] || []).sort((a,b) => (a.uhrzeit||"").localeCompare(b.uhrzeit||""));
    details.innerHTML = `<h3>${formatDatumDE(ausgewaehlterTag)}</h3>` +
      (eintraege.length
        ? eintraege.map(t => terminItemHtml(t, datumStatus(t.datum))).join("")
        : `<div class="leer">Keine Termine an diesem Tag.</div>`);
  } else {
    details.innerHTML = "";
  }
}

function renderAlles() {
  renderFilterChips();
  if (aktiverTab === "liste") {
    renderListe();
  } else {
    renderKalender();
  }
}

// --- Aktionen auf Termine ---
function erledigt(id) {
  const t = termine.find(x => x.id === id);
  if (!t) return;
  if (t.wiederholungTyp && t.wiederholungTyp !== "keine") {
    t.datum = naechstesDatum(t.datum, t.wiederholungTyp, t.wiederholungIntervall);
  } else {
    termine = termine.filter(x => x.id !== id);
  }
  speichern();
  renderAlles();
}

function kmAktualisieren(id) {
  const t = termine.find(x => x.id === id);
  if (!t) return;
  const eingabe = prompt("Aktueller Kilometerstand:", t.aktuellerKm);
  if (eingabe === null) return;
  const km = parseInt(eingabe, 10);
  if (isNaN(km) || km < 0) return;
  t.aktuellerKm = km;
  while (t.aktuellerKm >= t.naechsterKm) {
    t.naechsterKm += t.kmIntervall;
  }
  speichern();
  renderAlles();
}

function loeschen(id) {
  if (!confirm("Diesen Termin wirklich löschen?")) return;
  termine = termine.filter(x => x.id !== id);
  speichern();
  renderAlles();
}

// --- Modal / Formular ---
function befuelleKategorieAuswahl(ausgewaehlt) {
  const select = document.getElementById("f-kategorie");
  select.innerHTML = "";
  kategorien.forEach(k => {
    const opt = document.createElement("option");
    opt.value = k.name;
    opt.textContent = `${k.icon} ${k.name}`;
    select.appendChild(opt);
  });
  const neuOpt = document.createElement("option");
  neuOpt.value = "__neu__";
  neuOpt.textContent = "➕ Neue Kategorie...";
  select.appendChild(neuOpt);
  select.value = ausgewaehlt || kategorien[0].name;
}

function aktualisiereFormularSichtbarkeit() {
  const art = document.querySelector('input[name="f-art"]:checked').value;
  document.getElementById("datumFelder").style.display = art === "datum" ? "" : "none";
  document.getElementById("kmFelder").style.display = art === "km" ? "" : "none";

  const wiederholungTyp = document.getElementById("f-wiederholung-typ").value;
  document.getElementById("intervallFeld").style.display = wiederholungTyp === "keine" ? "none" : "";

  document.getElementById("neueKatFelder").style.display =
    document.getElementById("f-kategorie").value === "__neu__" ? "flex" : "none";

  document.getElementById("kalenderBtn").style.display =
    (bearbeiteId && art === "datum") ? "" : "none";
}

function openForm(t) {
  bearbeiteId = t ? t.id : null;
  document.getElementById("modalTitel").textContent = t ? "Termin bearbeiten" : "Neuer Termin";
  document.getElementById("loeschenBtn").style.display = t ? "" : "none";

  document.getElementById("f-titel").value = t ? t.titel : "";
  document.getElementById("f-notiz").value = t ? (t.notiz || "") : "";
  befuelleKategorieAuswahl(t ? t.kategorie : null);

  const art = t ? t.art : "datum";
  document.querySelector(`input[name="f-art"][value="${art}"]`).checked = true;

  document.getElementById("f-datum").value = (t && t.art === "datum") ? t.datum : heuteISO();
  document.getElementById("f-uhrzeit").value = (t && t.art === "datum") ? (t.uhrzeit || "") : "";
  document.getElementById("f-wiederholung-typ").value = (t && t.art === "datum") ? t.wiederholungTyp : "keine";
  document.getElementById("f-wiederholung-intervall").value = (t && t.art === "datum") ? t.wiederholungIntervall : 1;

  document.getElementById("f-aktueller-km").value = (t && t.art === "km") ? t.aktuellerKm : "";
  document.getElementById("f-km-intervall").value = (t && t.art === "km") ? t.kmIntervall : "";

  document.getElementById("f-kat-icon").value = "🔖";
  document.getElementById("f-kat-name").value = "";
  document.getElementById("f-kat-farbe").value = "#4f6df5";

  aktualisiereFormularSichtbarkeit();
  document.getElementById("modalOverlay").style.display = "flex";
  document.getElementById("f-titel").focus();
}

function closeForm() {
  document.getElementById("modalOverlay").style.display = "none";
  bearbeiteId = null;
}

function speicherForm(e) {
  e.preventDefault();

  let kategorieName = document.getElementById("f-kategorie").value;
  if (kategorieName === "__neu__") {
    const name = document.getElementById("f-kat-name").value.trim();
    if (!name) { alert("Bitte einen Namen für die neue Kategorie eingeben."); return; }
    if (!kategorien.find(k => k.name === name)) {
      kategorien.push({
        name,
        icon: document.getElementById("f-kat-icon").value.trim() || "🔖",
        farbe: document.getElementById("f-kat-farbe").value,
      });
    }
    kategorieName = name;
  }

  const art = document.querySelector('input[name="f-art"]:checked').value;
  const basis = {
    titel: document.getElementById("f-titel").value.trim(),
    kategorie: kategorieName,
    notiz: document.getElementById("f-notiz").value.trim(),
    art,
  };

  if (!basis.titel) return;

  let neuesTermin;
  if (art === "datum") {
    const datum = document.getElementById("f-datum").value;
    if (!datum) { alert("Bitte ein Datum auswählen."); return; }
    neuesTermin = {
      ...basis,
      datum,
      uhrzeit: document.getElementById("f-uhrzeit").value,
      wiederholungTyp: document.getElementById("f-wiederholung-typ").value,
      wiederholungIntervall: Math.max(1, parseInt(document.getElementById("f-wiederholung-intervall").value, 10) || 1),
    };
  } else {
    const aktuellerKm = parseInt(document.getElementById("f-aktueller-km").value, 10);
    const kmIntervall = parseInt(document.getElementById("f-km-intervall").value, 10);
    if (isNaN(aktuellerKm) || isNaN(kmIntervall) || kmIntervall <= 0) {
      alert("Bitte gültigen Kilometerstand und Intervall angeben.");
      return;
    }
    let naechsterKm = bearbeiteId
      ? termine.find(x => x.id === bearbeiteId).naechsterKm
      : aktuellerKm + kmIntervall;
    if (aktuellerKm >= naechsterKm) naechsterKm = aktuellerKm + kmIntervall;
    neuesTermin = { ...basis, aktuellerKm, kmIntervall, naechsterKm };
  }

  if (bearbeiteId) {
    const idx = termine.findIndex(x => x.id === bearbeiteId);
    termine[idx] = { ...termine[idx], ...neuesTermin };
  } else {
    neuesTermin.id = Date.now() + Math.floor(Math.random() * 1000);
    termine.push(neuesTermin);
  }

  speichern();
  closeForm();
  renderAlles();
}

// --- Event-Listener ---
document.querySelectorAll(".tab").forEach(btn => {
  btn.onclick = () => {
    aktiverTab = btn.dataset.tab;
    document.querySelectorAll(".tab").forEach(b => b.classList.remove("aktiv"));
    btn.classList.add("aktiv");
    document.getElementById("ansicht-liste").style.display = aktiverTab === "liste" ? "" : "none";
    document.getElementById("ansicht-kalender").style.display = aktiverTab === "kalender" ? "" : "none";
    renderAlles();
  };
});

document.getElementById("neuBtn").onclick = () => openForm(null);
document.getElementById("abbrechenBtn").onclick = closeForm;
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target.id === "modalOverlay") closeForm();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.getElementById("modalOverlay").style.display !== "none") closeForm();
});

document.getElementById("terminForm").addEventListener("submit", speicherForm);
document.getElementById("loeschenBtn").onclick = () => {
  if (bearbeiteId) loeschen(bearbeiteId);
  closeForm();
};
document.getElementById("kalenderBtn").onclick = () => {
  if (bearbeiteId) kalenderExport(bearbeiteId);
};

document.querySelectorAll('input[name="f-art"]').forEach(r => r.onchange = aktualisiereFormularSichtbarkeit);
document.getElementById("f-wiederholung-typ").onchange = aktualisiereFormularSichtbarkeit;
document.getElementById("f-kategorie").onchange = aktualisiereFormularSichtbarkeit;

document.getElementById("kalPrev").onclick = () => {
  kalenderDatum.setMonth(kalenderDatum.getMonth() - 1);
  ausgewaehlterTag = null;
  renderKalender();
};
document.getElementById("kalNext").onclick = () => {
  kalenderDatum.setMonth(kalenderDatum.getMonth() + 1);
  ausgewaehlterTag = null;
  renderKalender();
};

// Delegierte Klicks für Listeneinträge (auch innerhalb der Tagesdetails im Kalender)
document.body.addEventListener("click", e => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const id = Number(btn.dataset.id);
  switch (btn.dataset.action) {
    case "erledigt": erledigt(id); break;
    case "edit": openForm(termine.find(x => x.id === id)); break;
    case "delete": loeschen(id); break;
    case "km": kmAktualisieren(id); break;
    case "kalender": kalenderExport(id); break;
  }
});

// --- Zugangssperre ---
const ZUGANGS_PIN = "1974";

function entsperren() {
  document.getElementById("lockOverlay").style.display = "none";
  document.querySelector(".app").style.display = "block";
}

document.getElementById("lockForm").addEventListener("submit", e => {
  e.preventDefault();
  const eingabe = document.getElementById("lockEingabe");
  if (eingabe.value === ZUGANGS_PIN) {
    sessionStorage.setItem("lebensplaner_auth", "ok");
    entsperren();
  } else {
    document.getElementById("lockFehler").textContent = "Falsche PIN.";
    eingabe.value = "";
    eingabe.focus();
  }
});

if (sessionStorage.getItem("lebensplaner_auth") === "ok") {
  entsperren();
} else {
  document.getElementById("lockEingabe").focus();
}

// --- Cloud-Synchronisation ---
async function ladeVonCloud() {
  setSyncStatus("laedt");
  try {
    const snap = await getDoc(datenRef);
    if (snap.exists()) {
      const daten = snap.data();
      if (daten.termine) termine = daten.termine;
      if (daten.kategorien) kategorien = daten.kategorien;
      localStorage.setItem("lebensplaner_termine", JSON.stringify(termine));
      localStorage.setItem("lebensplaner_kategorien", JSON.stringify(kategorien));
      renderAlles();
    }
    setSyncStatus("ok");
  } catch (e) {
    console.error("Cloud-Laden fehlgeschlagen:", e);
    setSyncStatus("fehler");
  }
}

// --- Start ---
renderAlles();
ladeVonCloud();
</script>
